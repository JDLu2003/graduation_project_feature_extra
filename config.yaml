# 配置参数：多模态对话特征提取

paths:
  # dev_txt: 包含对话结构与情绪标记的文本文件路径
  dev_txt:   "../data_set/Viedeo_en_dev/dev.txt"
  # video_dir: 视频文件根目录，程序将在此目录下查找具体对话的视频文件夹
  video_dir: "../data_set/Viedeo_en_dev/Video_en_dev"
  # feat_out: 特征输出的根目录，输出结构将镜像输入视频的目录结构
  feat_out:  "../feat_out/Video_en_dev"

extractor:
  # type: 当前使用的特征提取器类型，例如 "visual_clip"
  type: "visual_clip"
  # visual_clip: CLIP 视觉特征提取器的配置
  visual_clip:
    # model_name: 使用的 CLIP 模型名称，例如 "ViT-B/32", "RN50"
    model_name: "ViT-B/32"
    # device: 计算设备 ("cpu", "cuda", "mps")
    device: "cpu"           # 或 "cuda" / "mps"
    # clip_output_dim: CLIP 模型原始输出特征维度 (例如 ViT-B/32 为 512)
    clip_output_dim: 512
    # target_dim: 最终特征的目标维度，所有特征将被投影到此维度 (例如 1024)
    target_dim: 1024
    # frame_sampling: 视频帧采样配置
    frame_sampling:
      # strategy: 视频帧采样策略 ("uniform": 均匀采样, "middle": 取中间帧, "first": 取第一帧)
      strategy: "uniform"     # "uniform" | "middle" | "first"
      # num_frames: 每次采样帧的数量
      num_frames: 8
      # aggregation: 对采样帧提取的特征进行聚合的方式 ("mean": 平均, "max": 最大值)
      aggregation: "mean"     # "mean" | "max"

non_speaker:
  # strategy: 非说话人特征提取策略 ("context_video": 上下文视频推断)
  strategy: "context_video"
  # fallback: 当上下文视频推断失败时，非说话人特征的填充策略 ("zero": 填充零向量)
  fallback: "zero"

pipeline:
  # skip_existing: 如果目标特征文件已存在，是否跳过 (true: 跳过, false: 覆盖)
  skip_existing: true
  # show_progress: 是否显示处理进度条
  show_progress: true